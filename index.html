<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #2f3136; color: white; height: 100vh; display: flex; }
        
        /* PC Layout (Default) */
        #sidebar { width: 250px; background: #202225; padding: 20px; border-right: 1px solid #000; }
        #chat-container { flex: 1; display: flex; flex-direction: column; }
        
        /* Mobile Layout (Overrides) */
        @media (max-width: 600px) {
            #sidebar { display: none; } /* Hide sidebar on mobile */
        }

        #messages { flex: 1; padding: 20px; overflow-y: auto; }
        .msg { background: #40444b; padding: 10px; margin-bottom: 5px; border-radius: 5px; }
        input { padding: 10px; border: none; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="login-screen" style="margin: auto; text-align: center;">
        <h2>Pilot Platform</h2>
        <input type="number" id="age" placeholder="Enter Age">
        <button onclick="startApp()">Login</button>
    </div>

    <div id="chat-screen" style="display:none; width: 100%;">
        <div id="sidebar">
            <h3>Settings</h3>
            <label>Display Name</label><br>
            <input type="text" id="newName" placeholder="New Name">
            <button onclick="updateName()">Save</button>
        </div>
        <div id="chat-container">
            <div id="messages"></div>
            <div style="padding: 10px; display: flex; gap: 5px;">
                <input type="text" id="msg" style="flex:1;" placeholder="Message...">
                <button onclick="send()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const supabase = supabase.createClient('https://qgrfomaigbfbeetafexl.supabase.co', 'sb_publishable_x7lqzAgNEH2YSohhpru3RQ_0TzyUwue');
        let socket, currentName = "Pilot", currentAge;

        async function startApp() {
            currentAge = document.getElementById('age').value;
            if(!currentAge) return alert("Enter Age!");
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';

            const { data } = await supabase.from('messages').select('*').eq('age', currentAge);
            if(data) data.forEach(display);

            socket = new WebSocket('wss://render-husi.onrender.com');
            socket.onmessage = (e) => display(JSON.parse(e.data));
        }

        function display(data) {
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerText = `${data.sender || 'User'}: ${data.text || ''}`;
            document.getElementById('messages').appendChild(div);
        }

        async function send() {
            const text = document.getElementById('msg').value;
            const payload = { sender: currentName, text, age: currentAge };
            await supabase.from('messages').insert([payload]);
            socket.send(JSON.stringify({ type: 'chat', ...payload }));
            document.getElementById('msg').value = '';
        }

        function updateName() {
            currentName = document.getElementById('newName').value;
            alert("Name updated to " + currentName);
        }
    </script>
</body>
</html>
