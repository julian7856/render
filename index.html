<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #36393f; color: white; height: 100vh; }
        #login-screen { padding: 50px; text-align: center; }
        #chat-screen { display: none; height: 100vh; flex-direction: column; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Pilot Login</h2>
        <div id="g_id_onload" data-client_id="205585516210-sk72oka4jppvr4micfes5m9dkvd27f1o.apps.googleusercontent.com" data-callback="handleLogin"></div>
        <div class="g_id_signin"></div>
        <input type="number" id="age" placeholder="Enter Age">
    </div>

    <div id="chat-screen">
        <div id="messages" style="flex:1; overflow-y:auto; padding:10px;"></div>
        <input type="text" id="msg" placeholder="Message...">
        <button onclick="send()">Send</button>
    </div>

    <script>
        // Declare supabase only once
        const supabase = supabase.createClient('https://qgrfomaigbfbeetafexl.supabase.co', 'sb_publishable_x7lqzAgNEH2YSohhpru3RQ_0TzyUwue');
        let socket, currentName, currentAge;

        // Ensure this function is available in the global scope
        window.handleLogin = async function(res) {
            try {
                const token = JSON.parse(window.atob(res.credential.split('.')[1]));
                currentName = token.name;
                currentAge = document.getElementById('age').value;
                
                if(!currentAge) return alert("Enter Age!");

                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';

                socket = new WebSocket('wss://render-husi.onrender.com');
                socket.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    const div = document.createElement('div');
                    div.innerText = (data.sender || "User") + ": " + (data.text || "");
                    document.getElementById('messages').appendChild(div);
                };
            } catch(e) {
                console.error("Login Error:", e);
            }
        };

        async function send() {
            const text = document.getElementById('msg').value;
            await supabase.from('messages').insert([{ sender: currentName, text, age: currentAge }]);
            socket.send(JSON.stringify({ type: 'chat', sender: currentName, text, age: currentAge }));
            document.getElementById('msg').value = '';
        }
    </script>
</body>
</html>
