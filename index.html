<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #2f3136; color: white; height: 100vh; display: flex; flex-direction: column; }
        
        /* Header */
        #header { padding: 10px; display: flex; justify-content: space-between; background: #202225; }
        
        /* Login Overlay */
        #login-overlay { position: fixed; top: 50px; right: 10px; background: #40444b; padding: 20px; border-radius: 8px; display: none; }
        
        /* Layout */
        #main-ui { display: flex; flex: 1; }
        #sidebar { width: 250px; background: #202225; padding: 20px; }
        @media (max-width: 600px) { #sidebar { display: none; } }
        
        #chat-container { flex: 1; display: flex; flex-direction: column; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; }
        .msg { background: #40444b; padding: 10px; margin-bottom: 5px; border-radius: 5px; }
        input { padding: 10px; border: none; border-radius: 4px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="header">
        <span>Pilot Platform</span>
        <button onclick="toggleLogin()">⋮</button>
    </div>

    <div id="login-overlay">
        <h2>Login</h2>
        <div id="g_id_onload" data-client_id="205585516210-sk72oka4jppvr4micfes5m9dkvd27f1o.apps.googleusercontent.com" data-callback="handleLogin"></div>
        <div class="g_id_signin"></div>
        <input type="number" id="age" placeholder="Enter Age" style="margin-top: 10px; color: black;">
    </div>

    <div id="main-ui">
        <div id="sidebar">
            <h3>Settings</h3>
            <input type="text" id="newName" placeholder="Display Name">
            <button onclick="updateName()" style="width:100%; margin-top:5px;">Save</button>
        </div>
        <div id="chat-container">
            <div id="messages"></div>
            <div style="padding: 10px; display: flex; gap: 5px;">
                <input type="text" id="msg" style="flex:1;" placeholder="Type a message...">
                <button onclick="send()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const supabase = supabase.createClient('https://qgrfomaigbfbeetafexl.supabase.co', 'sb_publishable_x7lqzAgNEH2YSohhpru3RQ_0TzyUwue');
        let socket, currentName = "Pilot", currentAge;

        function toggleLogin() {
            const overlay = document.getElementById('login-overlay');
            overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
        }

        async function handleLogin(res) {
            const token = JSON.parse(window.atob(res.credential.split('.')[1]));
            currentName = token.name;
            currentAge = document.getElementById('age').value;
            if(!currentAge) return alert("Enter Age first!");
            
            toggleLogin(); // Close menu
            
            socket = new WebSocket('wss://render-husi.onrender.com');
            socket.onmessage = (e) => display(JSON.parse(e.data));
            
            const { data } = await supabase.from('messages').select('*').eq('age', currentAge);
            if(data) data.forEach(display);
        }

        function display(data) {
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerText = `${data.sender || 'User'}: ${data.text || ''}`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        async function send() {
            if(!socket || socket.readyState !== WebSocket.OPEN) return alert("Please log in first!");
            const text = document.getElementById('msg').value;
            const payload = { sender: currentName, text, age: currentAge };
            await supabase.from('messages').insert([payload]);
            socket.send(JSON.stringify({ type: 'chat', ...payload }));
            document.getElementById('msg').value = '';
        }
    </script>
</body>
</html>
