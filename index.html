<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #36393f; color: #dcddde; display: flex; height: 100vh; }
        #sidebar { width: 240px; background: #2f3136; padding: 15px; border-right: 1px solid #202225; }
        #chat-main { flex: 1; display: flex; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { background: #40444b; padding: 10px; border-radius: 8px; max-width: 70%; width: fit-content; }
        #input-area { padding: 20px; display: flex; gap: 10px; background: #2f3136; }
        input { flex: 1; padding: 10px; background: #40444b; border: none; color: white; border-radius: 4px; }
        button { background: #5865f2; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="login-screen" style="margin: auto; text-align: center;">
        <h2>Pilot Platform Login</h2>
        <div id="g_id_onload" data-client_id="205585516210-sk72oka4jppvr4micfes5m9dkvd27f1o.apps.googleusercontent.com" data-callback="handleLogin"></div>
        <div class="g_id_signin"></div>
        <input type="number" id="age" placeholder="Enter Age" style="margin-top:10px;">
    </div>

    <div id="chat-screen" style="display:none; width: 100%; display: flex;">
        <div id="sidebar">
            <h3>Channels</h3># general-chat
            <div style="margin-top: 20px;">
                <input type="text" id="newName" placeholder="New Display Name">
                <button onclick="changeName()" style="width:100%; margin-top:5px;">Change Name</button>
            </div>
        </div>
        <div id="chat-main">
            <div id="messages"></div>
            <div id="input-area">
                <input type="text" id="msg" placeholder="Message...">
                <input type="file" id="fileInput" hidden>
                <button onclick="document.getElementById('fileInput').click()">+</button>
                <button onclick="send()">Send</button>
            </div>
        </div>
    </div>

    <script>
        // Integrated Supabase and WebSocket configuration
        const supabase = supabase.createClient('https://qgrfomaigbfbeetafexl.supabase.co', 'sb_publishable_x7lqzAgNEH2YSohhpru3RQ_0TzyUwue');
        let socket, currentName, currentAge;

        async function handleLogin(res) {
            const token = JSON.parse(window.atob(res.credential.split('.')[1]));
            currentName = token.name;
            currentAge = document.getElementById('age').value;
            if(!currentAge) return alert("Enter Age first!");
            
            socket = new WebSocket('wss://render-husi.onrender.com');
            
            // Fetch history from Supabase
            const { data: history } = await supabase.from('messages')
                .select('*').eq('age', currentAge).order('created_at', { ascending: true });
            if(history) history.forEach(displayMessage);

            socket.onopen = () => {
                socket.send(JSON.stringify({ type: 'join', name: currentName, age: currentAge }));
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
            };
            socket.onmessage = (e) => displayMessage(JSON.parse(e.data));
        }

        function displayMessage(data) {
            const div = document.createElement('div');
            div.className = 'msg-bubble';
            div.innerHTML = `<b>${data.sender || data.from}:</b> ${data.text || ''}`;
            if (data.img) div.innerHTML += `<br><img src="${data.img}" style="max-width:200px;">`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        async function send() {
            const file = document.getElementById('fileInput').files[0];
            const text = document.getElementById('msg').value;
            const payload = { sender: currentName, text, age: currentAge };

            if (file) {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    payload.img = e.target.result;
                    await supabase.from('messages').insert([payload]);
                    socket.send(JSON.stringify({ type: 'chat', ...payload }));
                };
                reader.readAsDataURL(file);
            } else {
                await supabase.from('messages').insert([payload]);
                socket.send(JSON.stringify({ type: 'chat', ...payload }));
            }
            document.getElementById('msg').value = '';
        }

        function changeName() {
            currentName = document.getElementById('newName').value;
            socket.send(JSON.stringify({ type: 'update-name', newName: currentName }));
        }
    </script>
</body>
</html>
