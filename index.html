<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #2f3136; color: white; height: 100vh; display: flex; flex-direction: column; }
        #login-area { padding: 20px; text-align: center; }
        #chat-area { display: none; flex: 1; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; }
        .msg { background: #40444b; padding: 10px; margin-bottom: 5px; border-radius: 5px; }
        input { padding: 10px; width: 80%; border-radius: 5px; border: none; }
    </style>
</head>
<body>

    <div id="login-area">
        <h2>Pilot Platform</h2>
        <input type="number" id="age" placeholder="Enter Age">
        <div id="g_id_onload" data-client_id="205585516210-sk72oka4jppvr4micfes5m9dkvd27f1o.apps.googleusercontent.com" data-callback="handleLogin"></div>
        <div class="g_id_signin" style="margin-top: 20px;"></div>
    </div>

    <div id="chat-area">
        <div id="messages"></div>
        <div style="padding: 10px;">
            <input type="text" id="msg" placeholder="Message...">
            <button onclick="send()">Send</button>
        </div>
    </div>

    <script>
        const supabase = supabase.createClient('https://qgrfomaigbfbeetafexl.supabase.co', 'sb_publishable_x7lqzAgNEH2YSohhpru3RQ_0TzyUwue');
        let socket, currentName, currentAge;

        async function handleLogin(res) {
            const token = JSON.parse(window.atob(res.credential.split('.')[1]));
            currentName = token.name;
            currentAge = document.getElementById('age').value;
            
            if(!currentAge) return alert("Enter Age first!");

            document.getElementById('login-area').style.display = 'none';
            document.getElementById('chat-area').style.display = 'flex';

            // Connect Socket
            socket = new WebSocket('wss://render-husi.onrender.com');
            socket.onmessage = (e) => display(JSON.parse(e.data));
            
            // Load History
            const { data } = await supabase.from('messages').select('*').eq('age', currentAge);
            if(data) data.forEach(display);
        }

        function display(data) {
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerText = `${data.sender || 'User'}: ${data.text || ''}`;
            document.getElementById('messages').appendChild(div);
        }

        async function send() {
            const text = document.getElementById('msg').value;
            const payload = { sender: currentName, text, age: currentAge };
            await supabase.from('messages').insert([payload]);
            socket.send(JSON.stringify({ type: 'chat', ...payload }));
            document.getElementById('msg').value = '';
        }
    </script>
</body>
</html>
