<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #36393f; color: white; height: 100vh; display: flex; flex-direction: column; }
        #login-screen { padding: 50px; text-align: center; }
        #chat-screen { display: none; height: 100vh; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; }
        .msg { background: #40444b; padding: 10px; margin-bottom: 5px; border-radius: 5px; }
        input, button { padding: 10px; border-radius: 5px; border: none; margin: 5px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Pilot Platform</h2>
        <input type="text" id="name" placeholder="Enter Your Name"><br>
        <input type="number" id="age" placeholder="Enter Age"><br>
        <button onclick="enterChat()">Enter Chat</button>
    </div>

    <div id="chat-screen">
        <div id="messages"></div>
        <div style="padding: 10px;">
            <input type="text" id="msg" style="width: 70%;" placeholder="Message...">
            <button onclick="send()">Send</button>
        </div>
    </div>

    <script>
        const supabase = supabase.createClient('https://bysvktyehbdkohjvmzmr.supabase.co', 'sb_publishable_x7lqzAgNEH2YSohhpru3RQ_0TzyUwue');
        let socket, currentName, currentAge;

        function enterChat() {
            currentName = document.getElementById('name').value;
            currentAge = document.getElementById('age').value;
            
            if(!currentName || !currentAge) return alert("Please enter name and age!");
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';

            socket = new WebSocket('wss://render-husi.onrender.com');
            socket.onmessage = (e) => {
                const data = JSON.parse(e.data);
                const div = document.createElement('div');
                div.className = 'msg';
                div.innerText = (data.sender || "User") + ": " + (data.text || "");
                document.getElementById('messages').appendChild(div);
            };
        }

        async function send() {
            const text = document.getElementById('msg').value;
            await supabase.from('messages').insert([{ sender: currentName, text, age: currentAge }]);
            socket.send(JSON.stringify({ type: 'chat', sender: currentName, text, age: currentAge }));
            document.getElementById('msg').value = '';
        }
    </script>
</body>
</html>
