<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilot Platform</title>
    <link rel="icon" href="icon.ico" type="image/x-icon">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #36393f; color: #dcddde; height: 100vh; display: flex; }
        #sidebar { width: 240px; background: #2f3136; padding: 15px; border-right: 1px solid #202225; }
        @media (max-width: 600px) { #sidebar { display: none; } }
        #chat-main { flex: 1; display: flex; flex-direction: column; height: 100vh; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { background: #40444b; padding: 10px; border-radius: 8px; max-width: 85%; width: fit-content; }
        #input-area { padding: 15px; display: flex; gap: 5px; background: #2f3136; }
        input { flex: 1; padding: 10px; background: #40444b; border: none; color: white; border-radius: 4px; }
        button { background: #5865f2; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen" style="margin: auto; text-align: center;">
        <h2>Pilot Platform</h2>
        <input type="text" id="name" placeholder="Name"><br><br>
        <button onclick="enter()" style="width: 80%;">Enter Platform</button>
    </div>

    <div id="chat-screen" style="display:none; width: 100%;">
        <div id="sidebar"><h3>Channels</h3># general-chat</div>
        <div id="chat-main">
            <div id="messages"></div>
            <div id="input-area">
                <input type="text" id="msg" placeholder="Message...">
                <button onclick="send()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const supabase = supabase.createClient('https://bysvktyehbdkohjvmzmr.supabase.co', 'sb_publishable_x7lqzAgNEH2YSohhpru3RQ_0TzyUwue');
        let socket, name;

        function enter() {
            name = document.getElementById('name').value;
            if(!name) return alert("Enter a name!");

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';

            socket = new WebSocket('wss://render-husi.onrender.com');
            socket.onmessage = (e) => display(JSON.parse(e.data));
        }

        function display(data) {
            const div = document.createElement('div');
            div.className = 'msg-bubble';
            div.innerHTML = `<b>${data.sender || 'User'}:</b> ${data.text || ''}`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        async function send() {
            const text = document.getElementById('msg').value;
            const payload = { sender: name, text: text };
            await supabase.from('messages').insert([payload]);
            socket.send(JSON.stringify(payload));
            document.getElementById('msg').value = '';
        }
    </script>
</body>
</html>
