<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #36393f; color: #dcddde; height: 100vh; display: flex; }
        
        /* Mobile/PC Responsive Sidebar */
        #sidebar { width: 240px; background: #2f3136; padding: 15px; border-right: 1px solid #202225; }
        @media (max-width: 600px) { #sidebar { display: none; } }
        
        #chat-main { flex: 1; display: flex; flex-direction: column; height: 100vh; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { background: #40444b; padding: 10px; border-radius: 8px; max-width: 85%; width: fit-content; }
        
        #login-screen { margin: auto; text-align: center; }
        #chat-screen { width: 100%; display: none; flex-direction: row; }
        input { padding: 10px; border-radius: 4px; border: none; background: #40444b; color: white; }
        button { background: #5865f2; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Pilot Platform Login</h2>
        <div id="g_id_onload" data-client_id="205585516210-sk72oka4jppvr4micfes5m9dkvd27f1o.apps.googleusercontent.com" data-callback="handleLogin"></div>
        <div class="g_id_signin"></div>
        <input type="number" id="age" placeholder="Enter Age" style="margin-top:10px; display:block; width: 100%;">
    </div>

    <div id="chat-screen">
        <div id="sidebar">
            <h3>Channels</h3>
            <p># general-chat</p>
        </div>
        <div id="chat-main">
            <div id="messages"></div>
            <div style="padding: 15px; display: flex; gap: 5px; background: #2f3136;">
                <input type="text" id="msg" style="flex:1;" placeholder="Message...">
                <button onclick="send()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const supabase = supabase.createClient('https://qgrfomaigbfbeetafexl.supabase.co', 'sb_publishable_x7lqzAgNEH2YSohhpru3RQ_0TzyUwue');
        let socket, currentName, currentAge;

        async function handleLogin(res) {
            const token = JSON.parse(window.atob(res.credential.split('.')[1]));
            currentName = token.name;
            currentAge = document.getElementById('age').value;
            if(!currentAge) return alert("Enter Age first!");
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            
            socket = new WebSocket('wss://render-husi.onrender.com');
            socket.onmessage = (e) => displayMessage(JSON.parse(e.data));
            
            const { data } = await supabase.from('messages').select('*').eq('age', currentAge);
            if(data) data.forEach(displayMessage);
        }

        function displayMessage(data) {
            const div = document.createElement('div');
            div.className = 'msg-bubble';
            div.innerHTML = `<b>${data.sender || 'User'}:</b> ${data.text || ''}`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        async function send() {
            const text = document.getElementById('msg').value;
            const payload = { sender: currentName, text, age: currentAge };
            await supabase.from('messages').insert([payload]);
            socket.send(JSON.stringify({ type: 'chat', ...payload }));
            document.getElementById('msg').value = '';
        }
    </script>
</body>
</html>
